<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up for Vega - AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center font-sans text-slate-800 p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 w-full max-w-md">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Create an Account</h1>
            <p class="text-sm text-slate-500 mt-2">Set up your profile to start using Vega.</p>
        </div>

        {% if error %}
        <div class="mb-6 p-4 text-sm text-red-800 rounded-lg bg-red-50 border border-red-200" role="alert">
            <span class="font-medium">Sign Up Failed:</span> {{ message }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'signup' %}" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="user_id" class="block text-sm font-medium text-slate-700 mb-1">Username (User ID)</label>
                <input type="text" id="user_id" name="user_id" required placeholder="e.g., sasidhar_123" value="{{ request.POST.user_id }}"
                       class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>

            <div>
                <label for="user_name" class="block text-sm font-medium text-slate-700 mb-1">Display Name</label>
                <input type="text" id="user_name" name="user_name" required placeholder="e.g., Sasidhar" value="{{ request.POST.user_name }}"
                       class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                       class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors">
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-semibold transition-colors shadow-md flex justify-center items-center gap-2">
                Sign Up
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-600">
            Already have an account? 
            <a href="{% url 'login' %}" class="font-medium text-indigo-600 hover:text-indigo-500 hover:underline">Log in here</a>
        </div>
    </div>

    <div class="mt-8 text-center text-sm text-slate-400">
        Powered by Google Agent Development Kit & Django
    </div>

</body>
</html>
